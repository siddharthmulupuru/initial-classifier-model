<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width" />
		<title>Cat vs Dog Classifier</title>
		<link rel="stylesheet" href="style.css" />
		<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
	</head>
	<body>
		<div class="card">
			<h1>Cat vs Dog Classifier</h1>

			<div id="drop" class="drop">
				<p id="drop-hint">Drag a photo of a cat or dog here, or click to choose a file.</p>
				<img id="preview" alt="" hidden />
			</div>
			<input id="file" type="file" accept="image/*" hidden />

			<div id="status" class="status">Loading model (~45 MB, one-time)…</div>

			<div id="results" hidden>
				<div class="bar-row">
					<span class="bar-label">Cat</span>
					<div class="bar-track"><div id="bar-cat" class="bar-fill"></div></div>
					<span id="pct-cat" class="bar-pct"></span>
				</div>
				<div class="bar-row">
					<span class="bar-label">Dog</span>
					<div class="bar-track"><div id="bar-dog" class="bar-fill"></div></div>
					<span id="pct-dog" class="bar-pct"></span>
				</div>
			</div>
		</div>

		<script>
			const SIZE = 192;
			const MEAN = [0.485, 0.456, 0.406];
			const STD = [0.229, 0.224, 0.225];
			const DOG = 0, CAT = 1;

			const drop = document.getElementById('drop');
			const fileInput = document.getElementById('file');
			const preview = document.getElementById('preview');
			const dropHint = document.getElementById('drop-hint');
			const status = document.getElementById('status');
			const results = document.getElementById('results');

			const sessionPromise = ort.InferenceSession.create('model.onnx')
				.then((s) => {
					status.textContent = 'Drop a photo above.';
					return s;
				})
				.catch((e) => {
					status.textContent = 'Failed to load model: ' + e.message;
					throw e;
				});

			function preprocess(bitmap) {
				const scale = SIZE / Math.min(bitmap.width, bitmap.height);
				const nw = Math.round(bitmap.width * scale);
				const nh = Math.round(bitmap.height * scale);
				const canvas = document.createElement('canvas');
				canvas.width = SIZE;
				canvas.height = SIZE;
				const ctx = canvas.getContext('2d');
				ctx.imageSmoothingEnabled = true;
				ctx.imageSmoothingQuality = 'high';
				ctx.drawImage(bitmap, -Math.floor((nw - SIZE) / 2), -Math.floor((nh - SIZE) / 2), nw, nh);
				const { data } = ctx.getImageData(0, 0, SIZE, SIZE);
				const chw = new Float32Array(3 * SIZE * SIZE);
				const plane = SIZE * SIZE;
				for (let i = 0; i < plane; i++) {
					for (let c = 0; c < 3; c++) {
						chw[c * plane + i] = (data[i * 4 + c] / 255 - MEAN[c]) / STD[c];
					}
				}
				return new ort.Tensor('float32', chw, [1, 3, SIZE, SIZE]);
			}

			async function classify(file) {
				if (!file || !file.type.startsWith('image/')) return;
				const bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });
				preview.src = URL.createObjectURL(file);
				preview.hidden = false;
				dropHint.hidden = true;
				status.textContent = 'Classifying…';
				results.hidden = true;
				try {
					const session = await sessionPromise;
					const out = await session.run({ input: preprocess(bitmap) });
					const probs = out.probs.data;
					show('cat', probs[CAT]);
					show('dog', probs[DOG]);
					const winner = probs[CAT] >= probs[DOG] ? 'cat' : 'dog';
					status.textContent =
						'Looks like a ' + winner + ' (' + (Math.max(probs[CAT], probs[DOG]) * 100).toFixed(1) + '% confident).';
					results.hidden = false;
				} catch (e) {
					status.textContent = 'Error: ' + e.message;
				}
			}

			function show(name, p) {
				document.getElementById('bar-' + name).style.width = (p * 100).toFixed(1) + '%';
				document.getElementById('pct-' + name).textContent = (p * 100).toFixed(1) + '%';
			}

			drop.addEventListener('click', () => fileInput.click());
			fileInput.addEventListener('change', () => classify(fileInput.files[0]));
			drop.addEventListener('dragover', (e) => {
				e.preventDefault();
				drop.classList.add('over');
			});
			drop.addEventListener('dragleave', () => drop.classList.remove('over'));
			drop.addEventListener('drop', (e) => {
				e.preventDefault();
				drop.classList.remove('over');
				classify(e.dataTransfer.files[0]);
			});
		</script>
	</body>
</html>
